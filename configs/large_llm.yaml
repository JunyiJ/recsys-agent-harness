run_name: large_llm

data:
  corpus_path: data/corpus/recsys_recent_2024_2025_300.jsonl
  tasks_path: data/tasks/recsys_recent_2024_2025_tasks.jsonl

agents:
  - baseline_rag
  - react_agent
  - planner_executor

agent_settings:
  baseline_rag:
    top_k: 8
  react_agent:
    top_k: 5
    max_searches: 4
  planner_executor:
    top_k: 5

models:
  actor: gpt-4.1-mini
  judge: gpt-5

evaluator:
  type: llm

output:
  output_dir: results
  report_filename: benchmark_report_large_llm_1.json
  manifest_filename: run_manifest_large_llm_1.json
